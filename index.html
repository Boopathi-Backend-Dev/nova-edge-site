<!doctype html>
<html lang="en">
  <head>
    <!-- Character Encoding -->
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>
      NOVA EDGE | Web Development, Branding, UI/UX & Digital Solutions
    </title>

    <!-- SEO -->
    <meta
      name="description"
      content="NOVA EDGE is a creative digital agency offering web development, branding, UI/UX design, graphic design, SEO, and custom software solutions for businesses."
    />

    <meta
      name="keywords"
      content="NOVA EDGE, Web Development, React Developer, Website Design, UI UX, Branding, Graphic Design, SEO, Portfolio"
    />

    <meta name="author" content="NOVA EDGE" />

    <meta name="robots" content="index, follow" />

    <meta name="theme-color" content="#D08A1A" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.novaedge.in/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="NOVA EDGE | Creative Digital Agency"
    />

    <meta
      property="og:description"
      content="Creative agency specializing in Web Development, Branding, UI/UX Design, SEO, and Graphic Design."
    />

    <meta property="og:type" content="website" />

    <meta property="og:url" content="https://www.novaedge.in/" />

    <meta property="og:image" content="https://www.novaedge.in/logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="NOVA EDGE | Creative Digital Agency"
    />

    <meta
      name="twitter:description"
      content="Modern Web Development, Branding, UI/UX, SEO and Digital Solutions."
    />

    <meta
      name="twitter:image"
      content="https://www.novaedge.in/logo.png"
    />

    <!-- Apple -->
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "NOVA EDGE",
        "url": "https://www.novaedge.in",
        "logo": "https://www.novaedge.in/logo.png",
        "description": "Creative Digital Agency specializing in Web Development, Branding, UI/UX Design, Graphic Design, SEO and Software Solutions."
      }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
